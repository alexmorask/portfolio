hero:
  eyebrow: "STAFF SOFTWARE ENGINEER — BILLING & PAYMENTS"
  heading: "Alex Morask"
  introParagraph: >-
    I design and build the systems that keep my company paid — billing
    platforms, pricing engines, and monetization systems that provide
    flexibility, extensibility, and correctness at scale.
  secondaryParagraph: >-
    Over the past half decade, I've built billing and payments platforms at
    companies spanning fintech, marketplaces, and SaaS. Wherever I've worked in
    this space, I've always focused on the same things: correctness under
    failure — reconciling state when networks drop or providers retry — and
    building for scale as a platform, not a one-off solution. This is where
    I'll be writing through these problems as I hit them.

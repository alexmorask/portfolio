heroEyebrow: "STAFF SOFTWARE ENGINEER — BILLING, PAYMENTS & MONETIZATION"
heroHeading: "Alex Morask"
heroParagraph1: >-
  I design and build the systems that move money — billing engines, payment
  infrastructure, and monetization platforms that scale to millions of
  transactions.
heroParagraph2: >-
  Over the past decade I've led billing and payments platforms at
  high-growth fintech and marketplace companies — from idempotent ledger
  design to usage-based pricing engines processing billions in GMV. I write
  about the hard, unglamorous problems in payment systems: reconciliation,
  correctness under failure, and pricing models that scale.
